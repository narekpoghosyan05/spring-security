<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
                xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Narek's Company Home Page</title>
</head>
<body>

    <h2>Narek's Company Home Page</h2>

    <hr>

    <p>
        Welcome to the Narek's company home page!
    </p>

    <hr>

    <!-- Display user name and role -->
    <p>
        User: <span sec:authentication="principal.username"></span>
        <br><br>
        Role(s): <span sec:authentication="principal.authorities"></span>

        <hr>
    </p>


    <div sec:authorize="hasRole('MANAGER')">

        <!-- Add a link to point to /leaders ... this is for the manager -->
        <p>
            <a th:href="@{/leaders}">Leadership Meeting</a>
            (Only for Manager peeps)
        </p>

    </div>

    <div sec:authorize="hasRole('ADMIN')">

        <!-- Add a link to point to /systems ... this is for the admins -->
        <p>
            <a th:href="@{/systems}">IT Systems Meeting</a>
            (Only for Admin peeps)
        </p>

    </div>

    <!-- Add a logout button -->
    <form action="#" th:action="@{/logout}" method="POST">
        <input type="submit" value="Logout" />
    </form>
</body>
</html>
